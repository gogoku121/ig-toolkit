name: Android CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false'

jobs:
  kotlin-build:
    name: Build Kotlin APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Kotlin Debug APK
        id: debug
        run: |
          cd android-kotlin
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ig-toolkit-kotlin
          path: android-kotlin/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload to MinIO
        if: github.ref == 'refs/heads/main'
        env:
          MC_HOST_MINIO: ${{ secrets.MINIO_ENDPOINT }}
        run: |
          which mc || (curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc && chmod +x /tmp/mc && /tmp/mc alias set local ${{ secrets.MINIO_ENDPOINT }} ${{ secrets.MINIO_ACCESS_KEY }} ${{ secrets.MINIO_SECRET_KEY }})
          /tmp/mc cp android-kotlin/app/build/outputs/apk/debug/app-debug.apk local/ig-toolkit/latest-kotlin.apk || true
          /tmp/mc cp android-kotlin/app/build/outputs/apk/debug/app-debug.apk "local/ig-toolkit/kotlin-${{ github.sha }}.apk" || true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: kotlin-build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
