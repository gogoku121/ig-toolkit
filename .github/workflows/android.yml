name: Android CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Check formatting
        run: npm run format:check || true

  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build web app
        run: |
          npm run build:web

      - name: Copy web assets
        run: |
          mkdir -p android/app/src/main/assets/web
          cp -r www/* android/app/src/main/assets/web/

      - name: Build Debug APK
        id: debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20

      - name: Build Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        id: release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -20

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload to MinIO
        if: github.ref == 'refs/heads/main'
        env:
          MC_HOST_MINIO: ${{ secrets.MINIO_ENDPOINT }}
        run: |
          which mc || (curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc && chmod +x /tmp/mc && /tmp/mc alias set local ${{ secrets.MINIO_ENDPOINT }} ${{ secrets.MINIO_ACCESS_KEY }} ${{ secrets.MINIO_SECRET_KEY }})
          /tmp/mc cp android/app/build/outputs/apk/debug/app-debug.apk local/ig-toolkit/latest.apk || true
          /tmp/mc cp android/app/build/outputs/apk/debug/app-debug.apk "local/ig-toolkit/apk-${{ github.sha }}.apk" || true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: android-build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-android:
    name: Sync to Android Repo
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Android project
        run: |
          git clone https://github.com/gogoku121/ig-toolkit-android.git /tmp/android
          cp -r /tmp/android/* android/
          rm -rf /tmp/android

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/web
          cp index.html android/app/src/main/assets/web/
          cp -r src/* android/app/src/main/assets/web/src/

      - name: Commit and push
        run: |
          cd android
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Sync from web: ${{ github.sha }}"
          git push origin main || true
